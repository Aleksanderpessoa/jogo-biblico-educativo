<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade para conhecimento bíblico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cabeçalho com elementos decorativos -->
    <header class="header-home">
        <div class="nuvens">
            <div class="nuvem nuvem1"></div>
            <div class="nuvem nuvem2"></div>
            <div class="nuvem nuvem3"></div>
        </div>
        
        <div class="estrelas">
            <div class="estrela estrela1"></div>
            <div class="estrela estrela2"></div>
            <div class="estrela estrela3"></div>
            <div class="estrela estrela4"></div>
        </div>
        
        <div class="arco-iris">
            <div class="arco arco1"></div>
            <div class="arco arco2"></div>
            <div class="arco arco3"></div>
            <div class="arco arco4"></div>
            <div class="arco arco5"></div>
        </div>
    </header>

    <!-- Conteúdo principal -->
    <main class="main-home">
        <div class="container-home">
            <!-- Card principal -->
            <div class="card-home">
                <!-- Título Igreja Verde -->
                <h2 class="titulo-igreja">Igreja Assembleia de Deus Madureira - Ecoporanga</h2>
                
                <!-- Título principal (menor) -->
                <h1 class="titulo-principal">
                    <span class="titulo-linha1" style="font-size: 2rem !important; color: #4169E1 !important;">Atividade para</span>
                    <span class="titulo-linha2" style="font-size: 2.5rem !important; background: linear-gradient(45deg, #FF69B4, #9370DB) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; background-clip: text !important;">conhecimento bíblico</span>
                </h1>
                
                <!-- Subtítulo -->
                <p class="subtitulo">
                    Aprenda sobre a Bíblia brincando e monte lindas imagens!
                </p>
                
                <!-- Área visual com elementos infantis cristãos -->
                <div class="area-visual">
                    <div class="icone-cristao">
                        <div class="cruz-simples"></div>
                    </div>
                    <div class="animais-amigaveis">
                        <div class="animal ovelha"></div>
                        <div class="animal leaozinho"></div>
                        <div class="animal passarinho"></div>
                    </div>
                    <div class="brilhos">
                        <div class="brilho brilho1"></div>
                        <div class="brilho brilho2"></div>
                        <div class="brilho brilho3"></div>
                    </div>
                </div>
                
                <!-- Botão principal -->
<button class="btn-iniciar" onclick="iniciarJogo()">
                    Vamos lá! Iniciar Quiz Bíblico!
                    <div class="btn-brilho"></div>
                </button>
                
                <!-- Mensagem motivacional -->
                <p class="mensagem-motivacional">
                    Descubra as histórias da Bíblia de forma divertida!
                </p>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="footer-home">
        <p>&copy; 2024 Atividade para conhecimento bíblico - Aprendendo com amor</p>
    </footer>

    <script>
        // Função para iniciar o jogo
        function iniciarJogo() {
            // Redireciona para a página do jogo
            window.location.href = 'jogo.html';
        }
        
        // Adiciona animações sutis quando a página carrega
        document.addEventListener('DOMContentLoaded', function() {
            // Animação de entrada para os elementos
            const elementos = document.querySelectorAll('.nuvem, .estrela');
            elementos.forEach((elemento, index) => {
                setTimeout(() => {
                    elemento.style.opacity = '1';
                    elemento.style.transform = 'translateY(0)';
                }, index * 200);
            });
        });
    </script>
</body>
</html>
